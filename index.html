<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOUND DIGITALIZER | 音のデジタル化ラボ</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --accent-analog: #38bdf8;
            --accent-digital: #f43f5e;
            --accent-green: #10b981;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--panel-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 5px;
            background: linear-gradient(to right, var(--accent-analog), var(--accent-digital));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            text-align: center;
            color: var(--text-sub);
            font-size: 0.9rem;
            margin-bottom: 25px;
        }

        .canvas-container {
            position: relative;
            margin-bottom: 25px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #334155;
        }

        canvas {
            background: #020617;
            display: block;
            width: 100%;
            height: auto;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        @media (max-width: 768px) {
            .grid-layout { grid-template-columns: 1fr; }
        }

        .control-panel, .info-panel {
            background: #111827;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #334155;
        }

        .panel-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 15px;
            border-left: 4px solid var(--accent-analog);
            padding-left: 10px;
        }

        .control-group {
            margin-bottom: 20px;
        }

        label {
            display: flex;
            justify-content: space-between;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        .label-val { color: var(--accent-analog); font-family: monospace; }
        .label-val.digital { color: var(--accent-digital); }

        input[type="range"] {
            width: 100%;
            height: 6px;
            background: #334155;
            border-radius: 5px;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--text-main);
            cursor: pointer;
            transition: transform 0.1s;
        }
        input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }

        .select-style {
            width: 100%;
            padding: 10px;
            background: #334155;
            color: var(--text-main);
            border: none;
            border-radius: 6px;
            font-weight: 600;
            outline: none;
        }

        .status-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #1e293b;
            font-size: 0.95rem;
        }
        .status-item:last-child { border-bottom: none; }
        .status-label { color: var(--text-sub); }
        .status-val { font-family: monospace; font-weight: 700; }

        .binary-box {
            background: #020617;
            padding: 10px;
            border-radius: 6px;
            font-family: monospace;
            color: var(--accent-green);
            word-break: break-all;
            margin-top: 5px;
            font-size: 0.85rem;
            max-height: 50px;
            overflow-y: auto;
        }

        .btn-container {
            text-align: center;
        }

        button {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            border: none;
            padding: 14px 40px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.4);
            transition: all 0.2s;
            width: 100%;
            max-width: 300px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.6);
        }

        button.playing {
            background: linear-gradient(135deg, #dc2626, #b91c1c);
            box-shadow: 0 4px 14px rgba(220, 38, 38, 0.4);
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
            font-size: 0.85rem;
        }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .dot { width: 12px; height: 12px; border-radius: 3px; }
    </style>
</head>
<body>

<div class="container">
    <h1>SOUND DIGITALIZER</h1>
    <div class="subtitle">情報Ⅰ：音のデジタル表現（標本化・量子化・符号化）シミュレーター</div>

    <div class="canvas-container">
        <canvas id="waveCanvas" width="850" height="320"></canvas>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="dot" style="background: var(--accent-analog)"></div> アナログ波形</div>
        <div class="legend-item"><div class="dot" style="background: var(--accent-digital)"></div> デジタル波形（パルスコード化）</div>
    </div>

    <div class="grid-layout">
        <div class="control-panel">
            <div class="panel-title">1. 各種パラメータの設定</div>
            
            <div class="control-group">
                <label>音色の種類 <span class="text-sub">※サイン波以外がおすすめ！</span></label>
                <select id="waveType" class="select-style">
                    <option value="sine">サイン波（シンプルな電子音）</option>
                    <option value="square" selected>矩形波（ゲーム機風のピコピコ音：変化が大）</option>
                    <option value="sawtooth">のこぎり波（激しいベース音：変化特大）</option>
                </select>
            </div>

            <div class="control-group">
                <label>① 標本化（サンプリング周波数） <span id="samplingVal" class="label-val">30</span></label>
                <input type="range" id="samplingSlider" min="6" max="120" value="30" step="1">
            </div>

            <div class="control-group">
                <label>② 量子化ビット数 <span id="quantizationBit" class="label-val digital">4 bit</span></label>
                <input type="range" id="quantizationSlider" min="1" max="8" value="4" step="1">
            </div>
        </div>

        <div class="info-panel">
            <div class="panel-title">2. デジタル変換ステータス</div>
            
            <div class="status-item">
                <span class="status-label">標本化（1周期あたりのサンプル数）</span>
                <span class="status-val" id="statusSamples">-</span>
            </div>
            <div class="status-item">
                <span class="status-label">量子化の段階数（2の累乗）</span>
                <span class="status-val" id="statusLevels">-</span>
            </div>
            <div class="status-item" style="flex-direction: column; align-items: flex-start; gap: 5px;">
                <span class="status-label">③ 符号化（直近のサンプル点の2進数データ）</span>
                <div class="binary-box" id="binaryDisplay">0101 1100 ...</div>
            </div>
        </div>
    </div>

    <div class="btn-container">
        <button id="playBtn">音を再生する</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('waveCanvas');
    const ctx = canvas.getContext('2d');
    const samplingSlider = document.getElementById('samplingSlider');
    const quantizationSlider = document.getElementById('quantizationSlider');
    const waveTypeSelect = document.getElementById('waveType');
    
    const samplingVal = document.getElementById('samplingVal');
    const quantizationBit = document.getElementById('quantizationBit');
    const statusSamples = document.getElementById('statusSamples');
    const statusLevels = document.getElementById('statusLevels');
    const binaryDisplay = document.getElementById('binaryDisplay');
    const playBtn = document.getElementById('playBtn');

    let audioCtx = null;
    let scriptProcessor = null;
    let isPlaying = false;

    // 数値を指定桁数の2進数文字列に変換する関数（符号化のシミュレート用）
    function toBinary(value, bits) {
        let bin = value.toString(2);
        while (bin.length < bits) { bin = "0" + bin; }
        return bin;
    }

    // 擬似的な音色波形を計算する関数（描画用）
    function getWaveValue(angle, type) {
        if (type === 'sine') return Math.sin(angle);
        if (type === 'square') return Math.sin(angle) >= 0 ? 0.6 : -0.6; // 矩形波
        if (type === 'sawtooth') return (angle % (Math.PI * 2)) / Math.PI - 1.0; // のこぎり波
        return 0;
    }

    function draw() {
        const width = canvas.width;
        const height = canvas.height;
        const centerY = height / 2;
        const amplitude = height * 0.38;

        ctx.clearRect(0, 0, width, height);

        // サイバー風背景グリッド
        ctx.strokeStyle = '#1e293b';
        ctx.lineWidth = 1;
        for (let i = 0; i < width; i += 40) {
            ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, height); ctx.stroke();
        }
        for (let j = 0; j < height; j += 40) {
            ctx.beginPath(); ctx.moveTo(0, j); ctx.lineTo(width, j); ctx.stroke();
        }
        ctx.strokeStyle = '#475569';
        ctx.beginPath(); ctx.moveTo(0, centerY); ctx.lineTo(width, centerY); ctx.stroke();

        // パラメータ取得
        const sCount = parseInt(samplingSlider.value);
        const qBit = parseInt(quantizationSlider.value);
        const qLevels = Math.pow(2, qBit);
        const wType = waveTypeSelect.value;

        // UI文字更新
        samplingVal.innerText = sCount + " Hz (相当)";
        quantizationBit.innerText = qBit + " bit";
        statusSamples.innerText = sCount + " 点 / 周期";
        statusLevels.innerText = qLevels + " 段階 (2の " + qBit + " 乗)";

        // 1. アナログ波形の描画（ライトブルー）
        ctx.strokeStyle = '#38bdf8';
        ctx.lineWidth = 3;
        ctx.shadowBlur = 0;
        ctx.beginPath();
        for (let x = 0; x < width; x++) {
            const angle = (x / width) * Math.PI * 2 * 2; // 2周期分
            const y = centerY + getWaveValue(angle, wType) * amplitude;
            if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.stroke();

        // 2. デジタル波形＆符号化の計算（ピンク）
        ctx.strokeStyle = '#f43f5e';
        ctx.fillStyle = '#f43f5e';
        ctx.lineWidth = 2;
        
        const stepX = width / sCount;
        let lastY = centerY;
        let binaryList = [];

        for (let i = 0; i <= sCount; i++) {
            const x = i * stepX;
            const angle = (x / width) * Math.PI * 2 * 2;
            const analogVal = getWaveValue(angle, wType);

            // 量子化計算
            const levelIndex = Math.round((analogVal + 1) / 2 * (qLevels - 1));
            const quantizedNormalized = levelIndex / (qLevels - 1);
            const digitalY = centerY + (quantizedNormalized * 2 - 1) * amplitude;

            // 符号化（上位いくつかのサンプルを2進数にする）
            if (i < sCount && i < 12) {
                binaryList.push(toBinary(levelIndex, qBit));
            }

            if (i === 0) {
                ctx.moveTo(x, digitalY);
            } else {
                ctx.lineTo(x, lastY);
                ctx.lineTo(x, digitalY);
            }
            
            if(i < sCount) {
                ctx.beginPath();
                ctx.arc(x, digitalY, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(x, digitalY);
            }
            lastY = digitalY;
        }
        ctx.stroke();

        // 符号化テキストエリアの更新
        binaryDisplay.innerText = binaryList.join(" | ") + (sCount > 12 ? " ...以下略" : "");
    }

    // イベントリスナー
    samplingSlider.addEventListener('input', draw);
    quantizationSlider.addEventListener('input', draw);
    waveTypeSelect.addEventListener('change', draw);

    // 音声処理
    function toggleAudio() {
        if (isPlaying) {
            if (scriptProcessor) { scriptProcessor.disconnect(); }
            if (audioCtx) { audioCtx.close(); audioCtx = null; }
            playBtn.innerText = "音を再生する";
            playBtn.classList.remove('playing');
            isPlaying = false;
        } else {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const bufferSize = 4096;
            scriptProcessor = audioCtx.createScriptProcessor(bufferSize, 0, 1);
            
            let phase = 0;
            const baseFreq = 180; // 少し低めの、響きやすいベース音の高さ

            scriptProcessor.onaudioprocess = function(e) {
                const outputBuffer = e.outputBuffer.getChannelData(0);
                const sCount = parseInt(samplingSlider.value);
                const qBit = parseInt(quantizationSlider.value);
                const qLevels = Math.pow(2, qBit);
                const wType = waveTypeSelect.value;
                
                const targetSampleRate = baseFreq * sCount; 

                for (let i = 0; i < bufferSize; i++) {
                    // 選択された音色でアナログ波形を作る
                    let analogValue = 0;
                    if (wType === 'sine') analogValue = Math.sin(phase);
                    else if (wType === 'square') analogValue = Math.sin(phase) >= 0 ? 0.4 : -0.4;
                    else if (wType === 'sawtooth') analogValue = (phase / Math.PI) - 1.0;

                    // 擬似サンプリング＆量子化
                    const stepSrc = audioCtx.sampleRate / targetSampleRate;
                    const quantizedValue = Math.round((analogValue + 1) / 2 * (qLevels - 1)) / (qLevels - 1) * 2 - 1;

                    outputBuffer[i] = quantizedValue;
                    
                    // 位相をループ
                    phase += (2 * Math.PI * baseFreq) / audioCtx.sampleRate;
                    if (phase > 2 * Math.PI) phase -= 2 * Math.PI;
                }
            };

            scriptProcessor.connect(audioCtx.destination);
            playBtn.innerText = "音を停止する";
            playBtn.classList.add('playing');
            isPlaying = true;
        }
    }

    playBtn.addEventListener('click', toggleAudio);
    draw(); // 初回描画
</script>

</body>
</html>
