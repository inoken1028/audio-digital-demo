<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音のデジタル化（A/D変換）学習シミュレーター</title>
    <style>
        :root {
            --bg-slate: #0f172a;
            --panel-slate: #1e293b;
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
            --blue-analog: #0ea5e9;
            --pink-digital: #f43f5e;
            --green-code: #10b981;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-slate);
            color: var(--text-light);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--panel-slate);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        /* グラフエリア */
        .canvas-container {
            background: #020617;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #334155;
            margin-bottom: 20px;
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
        }

        /* 手順に沿ったコントロール */
        .step-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        @media (max-width: 600px) {
            .step-container { grid-template-columns: 1fr; }
        }

        .step-box {
            background: #111827;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #334155;
        }

        .step-num {
            display: inline-block;
            font-size: 0.8rem;
            font-weight: bold;
            background: #334155;
            padding: 2px 8px;
            border-radius: 20px;
            margin-bottom: 8px;
        }

        .step-title {
            font-size: 1rem;
            font-weight: bold;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }

        .highlight-blue { color: var(--blue-analog); }
        .highlight-pink { color: var(--pink-digital); }

        input[type="range"] {
            width: 100%;
            margin-top: 5px;
        }

        .code-display {
            background: #020617;
            padding: 10px;
            border-radius: 6px;
            font-family: monospace;
            color: var(--green-code);
            font-size: 0.9rem;
            min-height: 24px;
            word-break: break-all;
        }

        /* 🌟 データ量計算（一番目立つ場所） */
        .result-box {
            background: linear-gradient(135deg, #1e3a8a, #0f172a);
            border: 2px solid #2563eb;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 25px;
        }

        .result-title {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 5px;
        }

        .result-value {
            font-size: 2rem;
            font-weight: 800;
            color: #60a5fa;
            font-family: monospace;
        }

        .result-formula {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 5px;
        }

        /* 再生ボタン */
        .btn-play {
            display: block;
            width: 100%;
            background: #2563eb;
            color: white;
            border: none;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-play:hover { background: #1d4ed8; }
        .btn-play.playing { background: #dc2626; }
    </style>
</head>
<body>

<div class="container">
    <h1>デジタル化（A/D変換）シミュレーター</h1>

    <div class="canvas-container">
        <canvas id="mainCanvas" width="800" height="280"></canvas>
    </div>

    <div class="step-container">
        <div class="step-box">
            <div class="step-num">STEP 1</div>
            <div class="step-title">① 標本化 <span id="valSampling" class="highlight-blue">40 Hz</span></div>
            <p style="margin:0 0 10px 0; font-size:0.85rem; color:var(--text-muted);">1秒間に音を区切る回数（サンプリング周波数）</p>
            <input type="range" id="sliderSampling" min="10" max="100" value="40" step="5">
        </div>

        <div class="step-box">
            <div class="step-num">STEP 2</div>
            <div class="step-title">② 量子化 <span id="valQuantization" class="highlight-pink">3 bit</span></div>
            <p style="margin:0 0 10px 0; font-size:0.85rem; color:var(--text-muted);">音の強弱を表現する細かさ（<span id="valLevels">8</span>段階）</p>
            <input type="range" id="sliderQuantization" min="1" max="6" value="3" step="1">
        </div>
    </div>

    <div class="step-box" style="margin-bottom: 20px;">
        <div class="step-num">STEP 3</div>
        <div class="step-title" style="color: var(--green-code);">③ 符号化（デジタル信号への変換）</div>
        <p style="margin:0 0 10px 0; font-size:0.85rem; color:var(--text-muted);">区切った各点の高さを「0」と「1」の2進数で記録します（最初の10点分を表示）</p>
        <div class="code-display" id="binaryOutput">000 100 ...</div>
    </div>

    <div class="result-box">
        <div class="result-title">💾 1秒間あたりのデータ量（ファイルサイズ）</div>
        <div class="result-value" id="calcResult">000 bit</div>
        <div class="result-formula" id="calcFormula">サンプリング周波数 × 量子化ビット数</div>
    </div>

    <button id="btnPlay" class="btn-play">実際の音を聴いてみる</button>
</div>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const sliderSampling = document.getElementById('sliderSampling');
    const sliderQuantization = document.getElementById('sliderQuantization');
    
    const valSampling = document.getElementById('valSampling');
    const valQuantization = document.getElementById('valQuantization');
    const valLevels = document.getElementById('valLevels');
    const binaryOutput = document.getElementById('binaryOutput');
    const calcResult = document.getElementById('calcResult');
    const calcFormula = document.getElementById('calcFormula');
    const btnPlay = document.getElementById('btnPlay');

    let audioCtx = null;
    let scriptProcessor = null;
    let isPlaying = false;

    // 10進数を2進数の文字列に（桁数を揃える）
    function numToBin(num, bits) {
        let bin = num.toString(2);
        while (bin.length < bits) { bin = "0" + bin; }
        return bin;
    }

    // メインの描画・計算処理
    function update() {
        const width = canvas.width;
        const height = canvas.height;
        const centerY = height / 2;
        const amplitude = height * 0.4;

        ctx.clearRect(0, 0, width, height);

        // 基本の横線
        ctx.strokeStyle = '#334155';
        ctx.beginPath(); ctx.moveTo(0, centerY); ctx.lineTo(width, centerY); ctx.stroke();

        // パラメータ取得
        const fs = parseInt(sliderSampling.value); // サンプリング周波数
        const bit = parseInt(sliderQuantization.value); // ビット数
        const levels = Math.pow(2, bit); // 段階数

        // 画面の文字更新
        valSampling.innerText = fs + " Hz";
        valQuantization.innerText = bit + " bit";
        valLevels.innerText = levels;

        // --- 🌟 データ量の計算 🌟 ---
        const totalBits = fs * bit; // 1秒間のビット数
        calcResult.innerText = totalBits.toLocaleString() + " bit (" + (totalBits / 8).toFixed(1) + " Byte)";
        calcFormula.innerText = `【計算式】 ${fs} Hz (標本化) × ${bit} bit (量子化) = ${totalBits.toLocaleString()} bit`;

        // 1. 元のアナログ波形（青い滑らかな線：※ここでは変化が分かりやすいのこぎり波ベース）
        ctx.strokeStyle = varColor('--blue-analog');
        ctx.lineWidth = 2;
        ctx.beginPath();
        for (let x = 0; x < width; x++) {
            const angle = (x / width) * Math.PI * 2 * 2; // 2周期分
            const rawVal = (angle % (Math.PI * 2)) / Math.PI - 1.0; // のこぎり波
            const y = centerY + rawVal * amplitude;
            if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.stroke();

        // 2. デジタル波形の計算と描画（赤い階段線）
        ctx.strokeStyle = varColor('--pink-digital');
        ctx.fillStyle = varColor('--pink-digital');
        ctx.lineWidth = 3;

        const stepX = width / fs;
        let lastY = centerY;
        let binaryArr = [];

        for (let i = 0; i <= fs; i++) {
            const x = i * stepX;
            const angle = (x / width) * Math.PI * 2 * 2;
            const rawVal = (angle % (Math.PI * 2)) / Math.PI - 1.0;

            // 量子化の段階（0 ～ levels-1）
            const levelIndex = Math.round((rawVal + 1) / 2 * (levels - 1));
            const digitalY = centerY + ((levelIndex / (levels - 1)) * 2 - 1) * amplitude;

            // 最初の10点分だけ符号化の2進数を配列に貯める
            if (i < fs && i < 10) {
                binaryArr.push(numToBin(levelIndex, bit));
            }

            if (i === 0) {
                ctx.moveTo(x, digitalY);
            } else {
                ctx.lineTo(x, lastY); // 階段状にするための横線
                ctx.lineTo(x, digitalY); // 縦線
            }

            // サンプリングポイントの点
            if (i < fs) {
                ctx.beginPath(); ctx.arc(x, digitalY, 4, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.moveTo(x, digitalY);
            }
            lastY = digitalY;
        }
        ctx.stroke();

        // 符号化テキスト更新
        binaryOutput.innerText = binaryArr.join(" | ") + " ...";
    }

    // CSS変数からカラーを取得する補助関数
    function varColor(name) {
        return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }

    // イベント
    sliderSampling.addEventListener('input', update);
    sliderQuantization.addEventListener('input', update);

    // 音声処理（シンプル化）
    function toggleAudio() {
        if (isPlaying) {
            if (scriptProcessor) scriptProcessor.disconnect();
            if (audioCtx) audioCtx.close();
            audioCtx = null;
            btnPlay.innerText = "実際の音を聴いてみる";
            btnPlay.classList.remove('playing');
            isPlaying = false;
        } else {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            scriptProcessor = audioCtx.createScriptProcessor(4096, 0, 1);
            
            let phase = 0;
            const baseFreq = 160; // 聴き取りやすい低音

            scriptProcessor.onaudioprocess = function(e) {
                const outputBuffer = e.outputBuffer.getChannelData(0);
                const fs = parseInt(sliderSampling.value);
                const bit = parseInt(sliderQuantization.value);
                const levels = Math.pow(2, bit);
                
                const targetSampleRate = baseFreq * fs; 

                for (let i = 0; i < 4096; i++) {
                    const rawVal = (phase / Math.PI) - 1.0; // のこぎり波
                    const levelIndex = Math.round((rawVal + 1) / 2 * (levels - 1));
                    const quantizedValue = (levelIndex / (levels - 1)) * 2 - 1;

                    outputBuffer[i] = quantizedValue * 0.4; // 音量調節
                    
                    phase += (2 * Math.PI * baseFreq) / audioCtx.sampleRate;
                    if (phase > 2 * Math.PI) phase -= 2 * Math.PI;
                }
            };

            scriptProcessor.connect(audioCtx.destination);
            btnPlay.innerText = "音を停止する";
            btnPlay.classList.add('playing');
            isPlaying = true;
        }
    }

    btnPlay.addEventListener('click', toggleAudio);
    
    // 初期起動
    update();
</script>

</body>
</html>
